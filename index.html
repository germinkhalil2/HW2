<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fireworks Over the Harbor</title>
  <link rel="stylesheet" href="stars-and-stripes.css" />
</head>
<body>


  <audio id="bgMusic" loop>
    <source src="assets/music/happy_bday_usa.mp3" type="audio/mpeg">
</audio>

<audio class="music-player" controls loop>
  <source src="assets/music/happy_bday_usa.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

  <header class="top-bar">
    <a href="#page1" class="logo">★ Stars & Stripes Canvas</a>

    <nav>
      <a href="#page1" aria-label="Go to Freedom's Dawn">01</a>
      <a href="#page2" aria-label="Go to Patriot's Plaza">02</a>
      <a href="#page3" aria-label="Go to United We Stand">03</a>
    </nav>
  </header>

  <main class="storybook">

    <section id="page1" class="scene dawn">
      <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/images/fireworks.mp4" type="video/mp4" />
      </video>

      <div class="dark-overlay"></div>
      <div class="stars"></div>
      <div class="flag"></div>
      <img class="dock-img" src="assets/images/dock.png" alt="Wooden Dock">
      <div class="water reflection-water"></div>
      <div class="boat boat-one"></div>
      <img class="boat-img boat-page2" src="assets/images/boat.png" alt="Boat">
      <div class="crowd"></div>

      <div class="scene-title left-title">
        <span>01</span>
        <h1>Freedom’s Dawn</h1>
      </div>
    </section>

    <section id="page2" class="scene plaza">
      <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/images/fireworks.mp4" type="video/mp4" />
      </video>

      <div class="dark-overlay"></div>
      <div class="stars"></div>
      <img class="eagle-img" src="assets/images/eagle.png" alt="Patriotic Eagle">
      <div class="smoke smoke-one"></div>
      <div class="smoke smoke-two"></div>
      <div class="smoke smoke-three"></div>
      <div class="smoke smoke-four"></div>
      <div class="smoke smoke-five"></div>
      <div class="smoke smoke-six"></div>

      <div class="skyline"></div>
      <div class="water reflection-water"></div>

    <div class="boat boat-two"></div>
<div class="boat boat-three"></div>

<!-- Cheering Crowd -->
<img
    class="cheering-crowd"
    src="assets/images/cheering_crowd.png"
    alt="Cheering Crowd">

<div class="scene-title center-title">
        <span>02</span>
        <h1>Patriot’s Plaza</h1>
      </div>
    </section>

    <section id="page3" class="scene unity">
      <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/images/fireworks.mp4" type="video/mp4" />
      </video>

      <div class="dark-overlay"></div>
      <div class="stars"></div> 
      <div class="scene-title right-title">
        <span>03</span>
        <h1>United We Stand</h1>
        <a href="#page1">Restart ★</a>
      </div>
<div class="unity-image">
    <img src="assets/images/unitedwestand.png" alt="United We Stand">
</div>

  
    </section>

  </main>

</body>
</html>
